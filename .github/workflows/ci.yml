name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      # --ignore-scripts mirrors the dockerfile: esbuild's binary ships via its
      # platform optional-dependency, so no postinstall build is needed (and pnpm
      # 10+ would otherwise block it pending approval).
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - run: pnpm typecheck

      # keygen + rsa-4096 integration tests shell out to ssh-keygen, which is
      # preinstalled on ubuntu runners.
      - run: pnpm test

  image:
    name: docker build${{ github.event_name == 'push' && ' + push' || '' }}
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: log in to ghcr
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      # build always (validates the dockerfile on PRs); push only on push events
      # (main + tags), never on pull_request.
      - name: build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
